<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENTO - About Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0e6e6;
        }
        .header {
            display:flex;
            justify-content:space-between;
            align-items: center;
            background-color:#966293;
            color: white;
            padding: 20px 40px;
           
        }
        .logo{
            display:flex;
            align-items:center;
            gap:10px;
        }
        .logo img{
            height:50px;
        }
        .tagline{
            font-family:'Arial',serif;
            font-size:20px;
            font-style:italic;
            color: #f7f7f7;
        }
        nav{
            display:flex;
            align-items:center;
        }
        nav a{
            color:#fff;
            text-decoration: none;
            padding: 5px;
            font-size: 16px;
            position:relative;
        }
        nav a:not(:first-child)::before{
            content:' | ';
            color:#e6dcdc;
            margin-left:10px;
        }
        nav a:hover{
            color:#d1b1c7;
        }
        .main {
            text-align: center;
            padding: 20px;
        }
        .main h1 {
            font-size: 2.5em;
            color: #333;
        }
        .content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }
        .content img, .services {
            width: 60%; 
            max-width: 900px;
        }
        .content img {
            border-radius: 10px;
        }
        .services {
            background-color: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .services ul {
            list-style-type: none;
            padding: 0;
        }
        .services li {
            text-align: left;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <div class ="logo">
            <img src="logo.png" alt="Evento logo">
            <span class="tagline">We create You celebrate</span> 
        </div>
        <nav>
        <a href="home.html">Home</a>
        <a href="works.html">Works</a>
        <a href="services.html">Services</a>
        <a href="aboutus.html">About Us</a>
        <a href="contactus.html">Contact Us</a>
        </nav>
    </div>
    <div class="main">
        <h1>About Us</h1>
        <div class="content">
            <img src="/pictures/22.jpg" alt="Event setup">
            <div class="services">
                <h2>What do we do</h2>
                <ul>
                    <li>Pre wedding events</li>
                    <li>Weddings</li>
                    <li>Birthday parties</li>
                    <li>Baby showers</li>
                    <li>Product launch Events</li>
                    <li>Picnics</li>
                    <li>Corporate event management</li>
                </ul>
            </div>
        </div>
