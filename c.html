<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send a Message</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f3e8ee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url("/pictures/Career-in-Event-Management.webp"); 
            background-size: cover;
            background-position: center;
            padding-top:80px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            width: 100%;
            max-width: 600px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #966293;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            opacity: 0.8;
        }

        .logo {
            height: 50px;
        }

        .tagline {
            font-size: 18px;
            color: #fff;
            margin-left: 10px;
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
            padding: 0;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: #f0ebeb;
            font-weight: bold;
        }
        nav ul li:not(:last-child)::after {
            content: '|';
            margin-left: 15px;
            color: #f0ebeb;
        }

        .form-container {
            background-color: #fff;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-top: 30px;
            opacity: 0.95;
        }

        .form-container h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            background-color: #000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="logo.png" alt="Evento Logo" class="logo">
                <span class="tagline">We create, you celebrate</span>
            </div>
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="works.html">Works</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="aboutus.html">About Us</a></li>
                    <li><a href="contactus.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>

        <div class="form-container">
            <h2>Send a message</h2>
            <form id="contactForm">
                <label for="name">Name</label>
                <input type="text" id="name" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" required>

                <label for="eventType">Event Type</label>
                <input type="text" id="eventType" required>

                <label for="message">Message</label>
                <textarea id="message" rows="4" required></textarea>

                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById("contactForm").addEventListener("submit", function(event) {
            event.preventDefault();
            
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const eventType = document.getElementById("eventType").value;
            const message = document.getElementById("message").value;

            if (name && email && eventType && message) {
                alert("Thank you, your message has been sent!");

                window.location.href = "profile.html"; 
            } else {
                alert("Please fill in all fields.");
            }
        });
    </script>
</body>
</html>
