<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - EVENTO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0e4e4;
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color:#966293;
            color:#fff;
        }
        .logo {
            display:flex;
            align-items:center;
            gap:10px;
        }
        .logo img {
            height:50px;
        }
        .tagline {
            font-family:'Arial',serif;
            font-size:20px;
            font-style:italic;
            color:#f7f7f7;
        }
        nav {
            display: flex;
            align-items:center;
        }
        nav a {
            color:#fff;
            text-decoration:none;
            padding:5px;
            font-size:16px;
            position:relative;
        }
        nav a:not(:first-child)::before {
            content:"| ";
            color:#e6dcdc;
            margin-right:10px;
        }
        nav a:hover {
            color:#d1b1c7;
        }
        .contact-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            text-align: center;
        }
        .contact-header {
            font-size: 36px;
            margin: 0;
            width: 100%;
        }
        .contact-section img {
            width: 50%;
            border-radius: 10px;
        }
        .quote-button {
            display: inline-block;
            padding: 20px 40px;  
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 30px; 
            margin-left: 20px;
            text-align: center;
        }

        .get-in-touch {
            text-align: center;
            padding: 20px;
        }
        .get-in-touch h2 {
            color: #2b2b2b;
        }
        .contact-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .contact-info a {
            text-decoration: none;
            color: #000;
            font-size: 24px;
        }
        .contact-info a img {
            width: 30px;
            height: 30px;
        }
        .contact-details {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
        <img src="/pictures/logo.png" alt="EVENTO Logo">
        <span class="tagline">We Create you celebrate</span>
        </div>
        <nav>
            <a href="home.html">Home</a>
            <a href="\works.html">Works</a>
            <a href="services.html">Services</a>
            <a href="aboutus.html">About Us</a>
            <a href="contactus.html">Contact Us</a>
        </nav>
    </div>
    <div class="contact-section">
        <div>
            <h1 class="contact-header">Contact Us</h1>
            <img src="/pictures/c5a3c1bd-3fc7-4373-91a5-39671dc04ae1.jpg" alt="Celebration Image">
        </div>
        <a href="c.html" class="quote-button">Get a Quote</a>
    </div>

    <div class="get-in-touch">
        <h2>Get In Touch</h2>
        <div class="contact-info">
            <a href="tel:+911234567890"><img src="/pictures/telephone-icon-symbol-for-app-and-messenger-free-vector.jpg" alt="Phone Icon"></a>
            <a href="https://www.instagram.com"><img src="/pictures/il.png" alt="Instagram Icon"></a>
            <a href="https://www.facebook.com"><img src="/pictures/F.jpg" alt="Facebook Icon"></a>
            <a href="https://www.twitter.com"><img src="/pictures/Tw.jpg" alt="Twitter Icon"></a>
            <a href="https://www.youtube.com"><img src="/pictures/yt.jpg" alt="YouTube Icon"></a>
            <a href="https://www.whatsapp.com"><img src="/pictures/whsap.webp" alt="WhatsApp Icon"></a>
        </div>
    </div>

    <div class="contact-details">
        <p>+911234567890</p>
        <p>evento@gmail.com</p>
    </div>
</body>
</html>
